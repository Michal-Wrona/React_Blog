services:
  postgres:
    image: postgres:16
    container_name: reactblog-postgres
    environment:
      POSTGRES_DB: reactblog
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d reactblog"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
